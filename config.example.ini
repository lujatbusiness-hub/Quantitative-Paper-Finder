# paper_summarizer configuration template.
#
# Copy this file to config.ini and adjust the values to your machine:
#
#     cp config.example.ini config.ini
#
# config.ini is gitignored, so your personal paths never get committed. Any key
# you leave out falls back to the default shown here, so a partial config is fine.
# Paths may use ~ for your home directory and may contain spaces (no quotes).

[paths]
# REQUIRED. Folder where the Markdown summary notes are written. Works well as a
# folder inside an Obsidian vault, but it is plain Markdown so any app works.
# Use an absolute path or ~.
output_dir = ~/Paper Summaries

[model]
# Which local backend to talk to:
#   openai - any server speaking the OpenAI-compatible Chat Completions API.
#            Works with LM Studio, llama.cpp's server, vLLM, LocalAI, Jan,
#            KoboldCpp, text-generation-webui, GPT4All, and Ollama's /v1
#            endpoint. RECOMMENDED -- the most portable option.
#   ollama - Ollama's native API (/api/generate).
backend = openai

# Base URL of your local server.
#   openai backend -- include the /v1, e.g.:
#       Ollama     http://localhost:11434/v1
#       LM Studio  http://localhost:1234/v1
#       llama.cpp  http://localhost:8080/v1
#       vLLM       http://localhost:8000/v1
#   ollama backend -- host only, e.g.:
#       http://localhost:11434
base_url = http://localhost:11434/v1

# Model name exactly as your server exposes it (e.g. qwen2.5:7b for Ollama, or a
# model id / path / alias in LM Studio, llama.cpp, vLLM, ...). It must be an
# instruction-tuned chat model; see the README "Choosing a model" section.
model = qwen2.5:7b

# Optional API key / bearer token. Most local servers ignore it; some (vLLM,
# LocalAI, or a remote endpoint) require one. Leave blank if not needed.
api_key =

# Sampling temperature (lower = more deterministic).
temperature = 0.2

# Max tokens to generate per response. Raise if summaries get cut off.
# Set to 0 to let the server decide.
max_tokens = 2048

# Context window in tokens. ONLY used by the 'ollama' backend (sent as num_ctx).
# OpenAI-compatible servers set the context when the model is loaded and ignore
# this -- make sure that server is started with a large enough context.
num_ctx = 8192

# Characters per map chunk (~1300 tokens at 5000 chars).
chunk_chars = 5000

# Seconds to wait for a model response.
timeout = 600

[summary]
# Language the summaries are written in.
language = English

# Field of study, used to prime the model (e.g. "quantitative finance",
# "machine learning", "molecular biology"). Keep it broad for mixed topics.
domain = general academic research

# What the closing "Relevance / Application" section should focus on -- tailor
# this to how the papers apply to your own work.
relevance_focus = how the paper could inform future research and practical work in this field

[search]
# Default number of results for a `search:` line in links.txt.
default_top = 3
# Hard cap per search (each paper costs minutes in the local model).
max_top = 25
